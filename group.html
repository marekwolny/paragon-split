<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grupa — ParagonSplit</title>
<meta name="theme-color" content="#4f46e5">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ParagonSplit">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1 id="group-title">🏕️ Grupa</h1>
  <div class="header-btns">
    <button id="btn-install" class="btn-small hidden">📲 Zainstaluj</button>
    <button id="btn-share" class="btn-small">🔗 Udostępnij</button>
  </div>
</header>

<main>
  <div id="home-backlink"><a href="index.html">← strona główna</a></div>

  <section class="card">
    <h2>Nazwa wyjazdu</h2>
    <input type="text" id="group-name-input" maxlength="60">
  </section>

  <section class="card">
    <h2>Uczestnicy</h2>
    <div id="me-box"></div>
    <div id="people-list" class="chips"></div>
    <div class="row">
      <input type="text" id="person-name" placeholder="Imię" maxlength="30">
      <button id="btn-add-person" class="btn-small">Dodaj</button>
    </div>
  </section>

  <section class="card">
    <h2>Paragony</h2>
    <div id="receipts-list"></div>
    <button id="btn-add-receipt" class="btn-primary">➕ Dodaj paragon</button>
  </section>

  <section class="card">
    <h2>Rozliczenie wyjazdu <span class="muted small">(wszystko w PLN)</span></h2>
    <div id="group-summary"></div>
    <div id="group-settlement"></div>
    <div class="row summary-actions">
      <button id="btn-copy-group" class="btn-small">📋 Kopiuj rozliczenie</button>
    </div>
  </section>
</main>

<div id="toast" class="hidden"></div>

<script src="config.js"></script>
<script type="module" src="group.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grupa — ParagonSplit</title>
<meta name="theme-color" content="#4f46e5">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ParagonSplit">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1 id="group-title">🏕️ Grupa</h1>
  <div class="header-btns">
    <button id="btn-install" class="btn-small hidden">📲 Zainstaluj</button>
    <button id="btn-share" class="btn-small">🔗 Udostępnij</button>
  </div>
</header>

<main>
  <div id="home-backlink"><a href="index.html">← strona główna</a></div>

  <section class="card">
    <h2>Nazwa wyjazdu</h2>
    <input type="text" id="group-name-input" maxlength="60">
  </section>

  <section class="card">
    <h2>Uczestnicy</h2>
    <div id="me-box"></div>
    <div id="people-list" class="chips"></div>
    <div class="row">
      <input type="text" id="person-name" placeholder="Imię" maxlength="30">
      <button id="btn-add-person" class="btn-small">Dodaj</button>
    </div>
  </section>

  <section class="card">
    <h2>Paragony i wydatki</h2>
    <div id="receipts-list"></div>
    <button id="btn-add-receipt" class="btn-primary">➕ Dodaj wydatek (zdjęcie paragonu)</button>
    <details id="quick-expense">
      <summary>⚡ Szybki wydatek bez paragonu</summary>
      <div class="qe-form">
        <input type="text" id="qe-name" placeholder="Co? np. Taxi z lotniska" maxlength="60">
        <div class="row">
          <input type="number" id="qe-amount" min="0" step="0.01" inputmode="decimal" placeholder="Kwota">
          <select id="qe-currency">
            <option>PLN</option><option>EUR</option><option>USD</option><option>GBP</option>
            <option>CZK</option><option>HUF</option><option>CHF</option><option>NOK</option>
            <option value="__other">inna…</option>
          </select>
          <select id="qe-category">
            <option value="jedzenie">🍕 jedzenie</option>
            <option value="transport">🚗 transport</option>
            <option value="nocleg">🏨 nocleg</option>
            <option value="rozrywka">🎉 rozrywka</option>
            <option value="zakupy">🛒 zakupy</option>
            <option value="inne" selected>📦 inne</option>
          </select>
        </div>
        <p class="muted small">Kto zapłacił? (dzielone równo na wszystkich)</p>
        <div id="qe-payer" class="chips"></div>
        <button id="qe-add" class="btn-primary">Dodaj wydatek</button>
      </div>
    </details>
  </section>

  <section class="card">
    <h2>Wydatki wg kategorii <span class="muted small">(PLN)</span></h2>
    <div id="cat-chart"></div>
  </section>

  <section class="card">
    <h2>Rozliczenie wyjazdu <span class="muted small">(wszystko w PLN)</span></h2>
    <div id="group-summary"></div>
    <div id="group-settlement"></div>
    <div id="settled-list"></div>
    <div class="row summary-actions">
      <button id="btn-copy-group" class="btn-small">📋 Kopiuj</button>
      <button id="btn-csv" class="btn-small">⬇️ CSV</button>
      <button id="btn-print" class="btn-small">🖨️ Drukuj / PDF</button>
    </div>
  </section>

  <section class="card no-print">
    <details>
      <summary>🕒 Historia aktywności</summary>
      <div id="activity-list"></div>
    </details>
  </section>
</main>

<div id="toast" class="hidden"></div>

<script src="config.js"></script>
<script src="i18n.js"></script>
<script type="module" src="group.js"></script>
</body>
</html>
